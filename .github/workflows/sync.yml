name: Upstream Sync

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      actions: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git
        run: |
          git config user.name "${{ secrets.GIT_USERNAME }}"
          git config user.email "${{ secrets.GIT_EMAIL }}"

      - name: Add Upstream
        run: |
          git remote add upstream https://github.com/Vendicated/Vencord.git || true
          git fetch upstream

      - name: Merge upstream
        run: |
          git merge upstream/main -X theirs --no-edit

      - name: Check conflicts
        run: |
          if git ls-files -u | grep -q .; then
            echo "Merge conflicts detected"
            git ls-files -u
            exit 1
          fi

      - name: Commit changes
        run: |
          git add .
          git diff --cached --quiet || git commit -m "chore: sync with upstream"

      - name: Push
        run: git push origin main

      - name: Trigger DevBuild Workflow
        run: |
          gh workflow run build.yml --ref main -R ${{ github.repository }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
