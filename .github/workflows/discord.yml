name: Discord Notify

on:
  push:

jobs:
  notify:
    runs-on: ubuntu-latest

    steps:
      - name: Get Commit Data
        id: commit
        run: |
          RESPONSE=$(curl -s -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
          https://api.github.com/repos/${{ github.repository }}/commits/${{ github.sha }})

          FILES=$(echo "$RESPONSE" | jq '.files | length')
          ADD=$(echo "$RESPONSE" | jq '.stats.additions')
          DEL=$(echo "$RESPONSE" | jq '.stats.deletions')

          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)

          echo "files=$FILES" >> $GITHUB_OUTPUT
          echo "add=$ADD" >> $GITHUB_OUTPUT
          echo "del=$DEL" >> $GITHUB_OUTPUT
          echo "sha=$SHORT_SHA" >> $GITHUB_OUTPUT
          echo "fullsha=${{ github.sha }}" >> $GITHUB_OUTPUT

      - name: Send to Discord
        run: |
          curl -H "Content-Type: application/json" \
          -X POST \
          -d '{
            "content": "@everyone",
            "embeds": [{
              "title": "Vencord Updated !",
              "description": "Update Now !!",
              "color": 3447003,
              "thumbnail": {
                "url": "https://cdn.jsdelivr.net/gh/kucl8d/kucl8d@main/b75921f3-2732-4167-b309-99cd78c7b9c6.png"
              },
              "fields": [
                {
                  "name": "Author",
                  "value": "pluckerpilple"
                },
                {
                  "name": "Status",
                  "value": "Files Changed: ${{ steps.commit.outputs.files }}\nAdditions: ${{ steps.commit.outputs.add }}\nDeletions: ${{ steps.commit.outputs.del }}"
                },
                {
                  "name": "System",
                  "value": "Ready"
                },
                {
                  "name": "Comment",
                  "value": "[Commit ${{ steps.commit.outputs.sha }}](https://github.com/${{ github.repository }}/commit/${{ steps.commit.outputs.fullsha }})"
                }
              ],
              "footer": {
                "text": "GitHub Auto Update"
              },
              "timestamp": "${{ github.event.head_commit.timestamp }}"
            }]
          }' \
          ${{ secrets.DISCORD_WEBHOOK }}
