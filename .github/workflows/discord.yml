name: Discord Notify

on:
  push:
  schedule:
    - cron: "0 * * * *"  # كل ساعة

jobs:
  notify:
    runs-on: ubuntu-latest

    steps:
      - name: Get Commit Data
        id: commit
        run: |
          RESPONSE=$(curl -s -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
          https://api.github.com/repos/${{ github.repository }}/commits/${{ github.sha }})

          FILES=$(echo "$RESPONSE" | jq '.files | length')
          ADD=$(echo "$RESPONSE" | jq '.stats.additions')
          DEL=$(echo "$RESPONSE" | jq '.stats.deletions')
          DATE=$(echo "$RESPONSE" | jq -r '.commit.author.date')

          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)

          echo "files=$FILES" >> $GITHUB_OUTPUT
          echo "add=$ADD" >> $GITHUB_OUTPUT
          echo "del=$DEL" >> $GITHUB_OUTPUT
          echo "sha=$SHORT_SHA" >> $GITHUB_OUTPUT
          echo "fullsha=${{ github.sha }}" >> $GITHUB_OUTPUT
          echo "date=$DATE" >> $GITHUB_OUTPUT

      - name: Send to Discord
        run: |
          NOW=$(date -u +%s)
          COMMIT_TIME=$(date -d "${{ steps.commit.outputs.date }}" +%s)

          DIFF=$((NOW - COMMIT_TIME))
          MINUTES=$((DIFF / 60))
          HOURS=$((MINUTES / 60))

          if [ $HOURS -gt 0 ]; then
            LAST_UPDATE="Before $HOURS hours ago"
          elif [ $MINUTES -gt 0 ]; then
            LAST_UPDATE="Before $MINUTES minutes ago"
          else
            LAST_UPDATE="Just now"
          fi

          TYPE="${{ github.event_name }}"

          if [ "$TYPE" = "push" ]; then
            TITLE="Vencord Updated"
            COLOR=9605778
            STATUS="Files Changed: ${{ steps.commit.outputs.files }}\nAdditions: ${{ steps.commit.outputs.add }}\nDeletions: ${{ steps.commit.outputs.del }}"
            COMMENT="[${{ steps.commit.outputs.sha }}](https://github.com/${{ github.repository }}/commit/${{ steps.commit.outputs.fullsha }})"
          else
            TITLE="Vencord Status"
            COLOR=657930
            STATUS="Ahead ✅\nNo recent updates"
            COMMENT="No new commits"
          fi

          curl -H "Content-Type: application/json" \
          -X POST \
          -d "{
            \"content\": \"@everyone\",
            \"embeds\": [{
              \"title\": \"$TITLE\",
              \"color\": $COLOR,
              \"thumbnail\": {
                \"url\": \"https://cdn.jsdelivr.net/gh/kucl8d/kucl8d@main/b75921f3-2732-4167-b309-99cd78c7b9c6.png\"
              },
              \"fields\": [
                {
                  \"name\": \"Author\",
                  \"value\": \"<@375402345971974147>\"
                },
                {
                  \"name\": \"Status\",
                  \"value\": \"$STATUS\"
                },
                {
                  \"name\": \"System\",
                  \"value\": \"Ready\"
                },
                {
                  \"name\": \"Last Update\",
                  \"value\": \"$LAST_UPDATE\"
                },
                {
                  \"name\": \"Comment\",
                  \"value\": \"$COMMENT\"
                }
              ],
              \"footer\": {
                \"text\": \"Vencord Status\"
              }
            }]
          }" \
          ${{ secrets.DISCORD_WEBHOOK }}
