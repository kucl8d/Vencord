name: Discord Notify

on:
  push:
  schedule:
    - cron: "* * * * *"

jobs:
  notify:
    runs-on: ubuntu-latest

    steps:
      - name: Get Commit Data
        id: commit
        run: |
          RESPONSE=$(curl -s https://api.github.com/repos/${{ github.repository }}/commits)

          SHA=$(echo "$RESPONSE" | jq -r '.[0].sha')

          COMMIT=$(curl -s https://api.github.com/repos/${{ github.repository }}/commits/$SHA)

          FILES=$(echo "$COMMIT" | jq '.files | length')
          ADD=$(echo "$COMMIT" | jq '.stats.additions')
          DEL=$(echo "$COMMIT" | jq '.stats.deletions')
          DATE=$(echo "$COMMIT" | jq -r '.commit.author.date')

          SHORT_SHA=$(echo "$SHA" | cut -c1-7)

          echo "files=$FILES" >> $GITHUB_OUTPUT
          echo "add=$ADD" >> $GITHUB_OUTPUT
          echo "del=$DEL" >> $GITHUB_OUTPUT
          echo "sha=$SHORT_SHA" >> $GITHUB_OUTPUT
          echo "fullsha=$SHA" >> $GITHUB_OUTPUT
          echo "date=$DATE" >> $GITHUB_OUTPUT

      - name: Build Status
        id: status
        run: |
          NOW=$(date -u +%s)
          COMMIT_TIME=$(date -d "${{ steps.commit.outputs.date }}" +%s)
      
          DIFF=$((NOW - COMMIT_TIME))
      
          MINUTES=$((DIFF / 60))
          HOURS=$((DIFF / 3600))
          DAYS=$((DIFF / 86400))
      
          # تحديد النص المناسب
          if [ $MINUTES -lt 60 ]; then
            TIME_TEXT="$MINUTES minutes ago"
          elif [ $HOURS -lt 24 ]; then
            TIME_TEXT="$HOURS hours ago"
          else
            TIME_TEXT="$DAYS days ago"
          fi
      
          # المود (نفس نظامك)
          if [ $MINUTES -ge 20 ]; then
            echo "mode=stable" >> $GITHUB_OUTPUT
          else
            echo "mode=update" >> $GITHUB_OUTPUT
          fi
      
          echo "time_text=$TIME_TEXT" >> $GITHUB_OUTPUT


      - name: Edit Discord Message (Single Message)
        run: |
          MODE="${{ steps.status.outputs.mode }}"
          TIME_TEXT="${{ steps.status.outputs.time_text }}"

          if [ "$MODE" = "update" ]; then

            curl -H "Content-Type: application/json" \
            -X PATCH \
            -d "{
              \"content\": \"@everyone\",
              \"embeds\": [{
                \"title\": \"Vencord Updated\",
                \"color\": 9605778,
                \"thumbnail\": {
                  \"url\": \"https://cdn.jsdelivr.net/gh/kucl8d/kucl8d@main/b75921f3-2732-4167-b309-99cd78c7b9c6.png\"
                },
                \"fields\": [
                  {
                    \"name\": \"Author\",
                    \"value\": \"<@375402345971974147>\",
                    \"inline\": false
                  },
                  {
                    \"name\": \"Status\",
                    \"value\": \"Files Changed: ${{ steps.commit.outputs.files }}\nAdditions: ${{ steps.commit.outputs.add }}\nDeletions: ${{ steps.commit.outputs.del }}\",
                    \"inline\": false
                  },
                  {
                    \"name\": \"System\",
                    \"value\": \"Ready\",
                    \"inline\": false
                  },
                  {
                    \"name\": \"Comment\",
                    \"value\": \"[${{ steps.commit.outputs.sha }}](https://github.com/${{ github.repository }}/commit/${{ steps.commit.outputs.fullsha }})\",
                    \"inline\": false
                  }
                ],
                \"footer\": {
                  \"text\": \"Vencord Update\"
                }
              }]
            }" \
            ${{ secrets.DISCORD_WEBHOOK }}/messages/${{ secrets.MESSAGE_ID }}

          else

            LAST_UPDATE="Before $TIME_TEXT"

            curl -H "Content-Type: application/json" \
            -X PATCH \
            -d "{
              \"content\": \"\",
              \"embeds\": [{
                \"title\": \"Vencord Status\",
                \"color\": 657930,
                \"thumbnail\": {
                  \"url\": \"https://cdn.jsdelivr.net/gh/kucl8d/kucl8d@main/b75921f3-2732-4167-b309-99cd78c7b9c6.png\"
                },
                \"fields\": [
                  {
                    \"name\": \"Author\",
                    \"value\": \"<@375402345971974147>\",
                    \"inline\": false
                  },
                  {
                    \"name\": \"Status\",
                    \"value\": \"Ahead ✅\",
                    \"inline\": false
                  },
                  {
                    \"name\": \"System\",
                    \"value\": \"Ready\",
                    \"inline\": false
                  },
                  {
                    \"name\": \"Last Update\",
                    \"value\": \"$LAST_UPDATE\",
                    \"inline\": false
                  }
                ],
                \"footer\": {
                  \"text\": \"Vencord Status\"
                }
              }]
            }" \
            ${{ secrets.DISCORD_WEBHOOK }}/messages/${{ secrets.MESSAGE_ID }}

          fi

          
