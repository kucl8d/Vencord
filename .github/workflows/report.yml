name: Patch Report

on:
  workflow_dispatch:
    inputs:
      webhook_url:
        description: Discord Webhook URL
        required: true
      discord_branch:
        description: Discord branch
        required: false
        default: both

jobs:
  report:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run report
        run: |
          export PATH="$PWD/node_modules/.bin:$PATH"
          node scripts/generateReport.ts > report.txt || true

      - name: Send webhook
        run: |
          CONTENT=$(cat report.txt | head -c 1900)

          curl -X POST "${{ inputs.webhook_url }}" \
          -H "Content-Type: application/json" \
          -d "{\"content\":\"REPORT:\n\`\`\`\n$CONTENT\n\`\`\`\"}"
